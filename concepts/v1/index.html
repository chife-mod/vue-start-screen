<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUE — Concept v1 (Animated)</title>
<link rel="stylesheet" href="../../shared/service-menu.css">
<style>
:root {
  --bg: #021617;
  --green: #6ffbb5;
  --green-soft: #79fbba;
  --yellow: #ffec8b;
  --stage-w: 1280px;
  --stage-h: 1280px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: #fff;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
  height: 100%;
  width: 100%;
}

/* Viewport-fitting stage: scales 1280x1280 to whatever viewport we have, preserving aspect ratio. */
.stage-wrap {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: start center;
  overflow: hidden;
  background: var(--bg);
}

.stage {
  position: relative;
  width: var(--stage-w);
  height: var(--stage-h);
  background: var(--bg);
  transform-origin: center center;
  /* dynamic scale set in JS based on viewport */
  overflow: hidden;
}

/* ---- LAYERS (back to front) ---- */

/* 1. Panorama — seamless infinite horizontal loop.
   Figma node: x=-796, y=320, w=2085, h=885.
   We use two tracks side-by-side, animate -100% on the wrapper. */
.panorama-layer {
  position: absolute;
  top: 320px;
  left: -796px;
  width: 2085px;
  height: 885px;
  overflow: hidden;
  pointer-events: none;
}

.panorama-track {
  position: absolute;
  inset: 0;
  width: 200%;
  height: 100%;
  display: flex;
  animation: panorama-scroll 75s linear infinite;
  will-change: transform;
}

.panorama-track img {
  width: 50%;
  height: 100%;
  object-fit: cover;
  display: block;
  flex: 0 0 50%;
}

@keyframes panorama-scroll {
  from { transform: translate3d(0, 0, 0); }
  to   { transform: translate3d(-50%, 0, 0); }
}

/* Top + bottom gradient fade (from Figma linear-gradient overlay on the panorama) */
.panorama-fade {
  position: absolute;
  top: 320px;
  left: 0;
  width: 1280px;
  height: 885px;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgb(2,22,23) 0%, rgba(2,22,23,0) 25.8%),
    linear-gradient(0deg,   rgb(2,22,23) 0%, rgba(2,22,23,0) 22.5%);
}

/* 2. Pins container — clipped by mask, sits between fade and glasses */
.pins-layer {
  position: absolute;
  top: 563px;
  left: 76.05px;
  width: 1126.897px;
  height: 399px;
  pointer-events: none;
  -webkit-mask-image: url(../../assets/Mask.png);
          mask-image: url(../../assets/Mask.png);
  -webkit-mask-size: 100% 100%;
          mask-size: 100% 100%;
  -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;
}

/* Pins move in lockstep with the panorama: the track is twice as wide as the
   mask viewport (one full panorama width). Same speed / cycle as panorama. */
.pins-track {
  position: absolute;
  top: 0;
  left: 0;
  width: 200%;
  height: 100%;
  animation: pins-scroll 75s linear infinite;
  will-change: transform;
}

@keyframes pins-scroll {
  from { transform: translate3d(0, 0, 0); }
  to   { transform: translate3d(-50%, 0, 0); }
}

.pin {
  position: absolute;
  width: 74px;
  /* height varies; set inline */
  transform-origin: center bottom;
}

.pin__circle {
  position: absolute;
  top: 0;
  left: 9px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(121, 251, 186, 0.43);
  border: 1px solid rgba(121, 251, 186, 0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: grid;
  place-items: center;
  animation: pin-float 3s ease-in-out infinite;
  will-change: transform;
}

@keyframes pin-float {
  0%, 100% { transform: translate3d(0, -3px, 0); }
  50%      { transform: translate3d(0, 5px, 0); }
}

.pin__circle img {
  width: 40px;
  height: 40px;
  display: block;
  pointer-events: none;
  user-select: none;
}

.pin__line {
  position: absolute;
  top: 56px;
  left: 36px;
  width: 1px;
  background: linear-gradient(180deg, rgba(121,251,186,0.85) 0%, rgba(121,251,186,0.3) 100%);
}

.pin__dot {
  position: absolute;
  left: 31px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--green-soft);
  box-shadow: 0 0 8px rgba(121,251,186,0.7);
}

/* 3. Glasses + Reflections — overlay the lenses, sit on top of pins */
.glasses-img,
.reflections-img {
  position: absolute;
  top: 563px;
  left: 76.05px;
  width: 1126.897px;
  height: 399px;
  pointer-events: none;
  user-select: none;
}

.reflections-img {
  mix-blend-mode: screen;
  opacity: 0.95;
}

/* 4. STATIC TEXT + LOGOS */

.ep-logo {
  position: absolute;
  top: 71px;
  left: 550px;
  width: 179.38px;
  height: 64px;
}

.ep-logo img {
  display: block;
  width: 100%;
  height: 100%;
}

.vue-wordmark {
  position: absolute;
  top: 145px;
  left: 369px;
  width: 543px;
  height: 280px;
  display: grid;
  place-items: center;
  font-family: "Helvetica Neue", "Inter", sans-serif;
  font-weight: 100;
  font-size: 239px;
  letter-spacing: 64.53px;
  line-height: 1;
  white-space: nowrap;
  user-select: none;
  /* shift to compensate letter-spacing pushing trailing space */
  text-indent: 32px;
}

/* U is rendered via VUE-Logo.png overlay (real neon glow) — hide the text U so it doesn't double up */
.vue-wordmark .u {
  color: transparent;
}

.vue-wordmark .u-glow {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  user-select: none;
  display: block;
}

.subtitle {
  position: absolute;
  top: 415px;
  left: 370px;
  width: 542px;
  height: 25px;
  text-align: center;
  font-family: "Inter", sans-serif;
  font-weight: 400;
  font-size: 21px;
  line-height: 1.2;
  letter-spacing: 5.88px;
  color: var(--green);
  text-transform: uppercase;
  white-space: nowrap;
}

.tagline {
  position: absolute;
  top: 468px;
  left: 435px;
  width: 411px;
  height: 19px;
  text-align: center;
  font-family: "Inter", sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.2;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1.44px;
  white-space: nowrap;
}

/* Brand strip — 5 icon+text pairs (icons sourced from assets/lucide/*.svg via CSS mask) */
.brand-strip {
  position: absolute;
  top: 1099px;
  left: 111px;
  width: 1041px;
  height: 40px;
  display: flex;
  gap: 33px;
  align-items: center;
}

.brand-strip .brand-item {
  display: inline-flex;
  align-items: center;
  gap: 16px;
}

.brand-strip .brand-icon {
  width: 40px;
  height: 40px;
  flex: 0 0 40px;
  background-color: var(--yellow);
  -webkit-mask-position: center;
          mask-position: center;
  -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;
  -webkit-mask-size: 28px 28px; /* icon body 24×24 scaled to 28 inside 40 box, matching Figma inset ~12.5% */
          mask-size: 28px 28px;
}

.brand-icon--portfolio  { -webkit-mask-image: url(../../assets/lucide/lucide_building-2.svg);              mask-image: url(../../assets/lucide/lucide_building-2.svg); }
.brand-icon--compliance { -webkit-mask-image: url(../../assets/lucide/lucide_shield-check.svg);            mask-image: url(../../assets/lucide/lucide_shield-check.svg); }
.brand-icon--projects   { -webkit-mask-image: url(../../assets/lucide/lucide_briefcase-business.svg);      mask-image: url(../../assets/lucide/lucide_briefcase-business.svg); }
.brand-icon--incentives { -webkit-mask-image: url(../../assets/lucide/lucide_badge-dollar-sign.svg);       mask-image: url(../../assets/lucide/lucide_badge-dollar-sign.svg); }
.brand-icon--insights   { -webkit-mask-image: url(../../assets/lucide/lucide_chart-column-increasing.svg); mask-image: url(../../assets/lucide/lucide_chart-column-increasing.svg); }

.brand-strip span {
  font-family: "Inter", sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.2;
  letter-spacing: 4.48px;
  color: var(--yellow);
  text-transform: uppercase;
  white-space: nowrap;
}

/* Bottom city silhouette + footer */
.city-silhouette {
  position: absolute;
  top: 1177px;
  left: -8px;
  width: 1297px;
  height: 103px;
  display: flex;
  gap: 1px;
  align-items: flex-end;
  pointer-events: none;
}

.city-silhouette .bar {
  width: 10px;
  background: rgba(121,251,186,0.30);
  flex: 0 0 10px;
}

.footer {
  position: absolute;
  top: 1148px;
  left: 0;
  width: 1278px;
  height: 132px;
  background: linear-gradient(180deg, rgba(2,22,23,0.6) 0%, rgba(2,22,23,1) 60%);
}

.footer-text {
  position: absolute;
  top: 1205px;
  height: 19px;
  font-family: "Inter", sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.2;
  letter-spacing: 4.48px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  white-space: nowrap;
}

.footer-left  { left: 56px;   width: 206px; }
.footer-right { left: 1039px; width: 177px; text-align: right; }

</style>
</head>
<body>

<div class="stage-wrap">
  <div class="stage" id="stage">

    <!-- 1. Panorama -->
    <div class="panorama-layer">
      <div class="panorama-track">
        <img src="../../assets/Panorama.webp" alt="">
        <img src="../../assets/Panorama.webp" alt="" aria-hidden="true">
      </div>
    </div>
    <div class="panorama-fade"></div>

    <!-- 2. Pins (clipped by mask) -->
    <div class="pins-layer">
      <div class="pins-track" id="pinsTrack"></div>

    <!-- 3. Glasses + Reflections -->
    <img class="glasses-img"     src="../../assets/Glasses.webp"     alt="">
    <img class="reflections-img" src="../../assets/Reflections.png" alt="">

    <!-- 4. Top: EP logo -->
    <div class="ep-logo">
      <img src="../../assets/EP_Logo.svg" alt="EnergyPlus">
    </div>

    <!-- 6. Subtitle + tagline -->
    <div class="subtitle">Building Intelligence Platform</div>
    <div class="tagline">Your buildings. Your compliance. Your control.</div>

    <!-- 7. Brand strip -->
    <div class="brand-strip">
      <div class="brand-item">
        <div class="brand-icon brand-icon--portfolio"></div>
        <span>Portfolio</span>
      </div>
      <div class="brand-item">
        <div class="brand-icon brand-icon--compliance"></div>
        <span>Compliance</span>
      </div>
      <div class="brand-item">
        <div class="brand-icon brand-icon--projects"></div>
        <span>Projects</span>
      </div>
      <div class="brand-item">
        <div class="brand-icon brand-icon--incentives"></div>
        <span>Incentives</span>
      </div>
      <div class="brand-item">
        <div class="brand-icon brand-icon--insights"></div>
        <span>Insights</span>
      </div>
    </div>

    <!-- 8. City silhouette + footer -->
    <div class="city-silhouette" id="citySilhouette"></div>
    <div class="footer"></div>
    <div class="footer-text footer-left">energyplus.com</div>
    <div class="footer-text footer-right">#ENJOYTHEVUE</div>

  </div>
</div>

<!-- Service menu config -->
<script>
  window.PREVIEW_CONCEPTS = [
    { id: 'v1', label: 'v1 Animated', href: '../v1/' },
    { id: 'v2', label: 'v2 Static',   href: '../v2/' },
    { id: 'v3', label: 'v3 Static',   href: '../v3/' }
  ];
  window.PREVIEW_CURRENT = 'v1';
  window.PREVIEW_HOME    = '../../';
</script>
<script src="../../shared/service-menu.js" defer></script>

<script>
/* ----- Stage scaling to viewport ----- */
function resizeStage () {
  var stage = document.getElementById('stage');
  if (!stage) return;
  var scale = Math.min(window.innerWidth / 1280, window.innerHeight / 1280);
  stage.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', resizeStage);
resizeStage();

/* ----- City silhouette bars: replicate Figma 120 bars with the same height distribution ----- */
(function buildCitySilhouette () {
  var heights = [25,64,90,90,51,103,51,103,77,64,12,12,12,25,64,77,25,90,51,12,90,51,51,12,51,51,64,25,12,25,90,25,38,25,12,38,90,51,51,12,90,90,51,38,38,103,77,25,103,77,38,90,25,77,64,103,25,25,51,64,51,12,77,64,90,25,103,90,12,38,77,103,38,103,64,25,12,51,103,51,103,38,51,90,77,90,90,38,25,90,64,25,12,51,77,90,103,64,38,103,51,90,25,103,103,12,103,51,51,38,103,90,90,12,12,25,12,103,77,12];
  var c = document.getElementById('citySilhouette');
  for (var i = 0; i < heights.length; i++) {
    var b = document.createElement('div');
    b.className = 'bar';
    b.style.height = heights[i] + 'px';
    c.appendChild(b);
  }
})();

/* ----- Pins generation ----- */
(function buildPins () {
  var track   = document.getElementById('pinsTrack');
  /* track is 200% wide of the 1126.897 mask viewport = 2253.794 px. We place pins
     in the first half (one panorama width) then DUPLICATE them at +50% for seamless loop. */
  var halfW   = 1126.897;
  var pinH    = [12, 25, 38, 51, 64, 77, 90, 103];
  var icons   = [
    'shield-check', 'building-2', 'briefcase-business',
    'badge-dollar-sign', 'chart-column-increasing', 'battery-charging',
    'ev-charger', 'file-text', 'network', 'square-activity'
  ];

  /* Seeded pseudo-random for deterministic layout */
  var seed = 1337;
  function rand() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }

  var pinCount = 14;
  /* Distribute evenly across the half-width with jitter */
  var spacing = halfW / pinCount;

  function makePin(xWithinHalf, side, idx) {
    var pin = document.createElement('div');
    pin.className = 'pin';
    var lineH = pinH[Math.floor(rand() * pinH.length)];
    var height = 56 + lineH + 12; /* circle + line + dot */
    pin.style.height = height + 'px';
    /* Anchor pin BOTTOM to the lower band of the lens — dot ends ~30-60px from mask bottom */
    var bottomFromMaskBottom = 30 + rand() * 30;  /* dot sits 30-60px above mask bottom */
    pin.style.top  = (399 - height - bottomFromMaskBottom) + 'px';
    pin.style.left = (side * halfW + xWithinHalf) + 'px';

    var circle = document.createElement('div');
    circle.className = 'pin__circle';
    /* random phase + duration */
    var phase = (rand() * 3).toFixed(2);
    var dur   = (2.2 + rand() * 1.8).toFixed(2);
    circle.style.animationDelay    = '-' + phase + 's';
    circle.style.animationDuration = dur + 's';

    var iconName = icons[Math.floor(rand() * icons.length)];
    circle.innerHTML = '<img src="../../assets/lucide/lucide_' + iconName + '.svg" alt="" loading="eager">';

    var line = document.createElement('div');
    line.className = 'pin__line';
    line.style.height = lineH + 'px';

    var dot = document.createElement('div');
    dot.className = 'pin__dot';
    dot.style.top = (56 + lineH + 1) + 'px';

    pin.appendChild(circle);
    pin.appendChild(line);
    pin.appendChild(dot);
    return pin;
  }

  for (var i = 0; i < pinCount; i++) {
    var jitter = (rand() - 0.5) * spacing * 0.7;
    var x = spacing * (i + 0.5) + jitter;
    /* Save current rand state to reuse identical params for the duplicate */
    var stateBefore = seed;
    track.appendChild(makePin(x, 0, i));
    /* reset seed so duplicate uses the same icon / size / position offsets */
    seed = stateBefore;
    track.appendChild(makePin(x, 1, i));
  }
})();
</script>

</body>
</html>
