<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUE — Concept v1 (Animated)</title>
<link rel="stylesheet" href="../../shared/service-menu.css">
<style>
:root {
  --bg: #021617;
  --green: #6ffbb5;
  --green-soft: #79fbba;
  --yellow: #ffec8b;
  --stage-w: 1280px;
  --stage-h: 1280px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: #fff;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
  height: 100%;
  width: 100%;
}

/* Viewport-fitting stage: scales 1280x1280 to whatever viewport we have, preserving aspect ratio.
   Flexbox is more reliable than grid + place-items here — grid's place-items shorthand parsing
   varies across browsers when keywords like "top center" are involved. */
.stage-wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow: hidden;
  background: var(--bg);
}

.stage {
  position: relative;
  width: var(--stage-w);
  height: var(--stage-h);
  flex-shrink: 0;
  background: var(--bg);
  transform-origin: 50% 0%;
  /* dynamic scale set in JS based on viewport — origin (50% 0) so visual sticks to viewport top and stays horizontally centered */
  overflow: hidden;
}

/* ---- LAYERS (back to front) ---- */

/* 1. Panorama — seamless infinite horizontal loop.
   Figma node: x=-796, y=320, w=2085, h=885.
   We use two tracks side-by-side, animate -100% on the wrapper. */
.panorama-layer {
  position: absolute;
  top: 320px;
  left: -796px;
  width: 2085px;
  height: 885px;
  overflow: hidden;
  pointer-events: none;
}

.panorama-track {
  position: absolute;
  inset: 0;
  width: 8340px; /* 4 image copies: [O][M][O][M], M = scaleX(-1) */
  height: 100%;
  display: flex;
  animation: panorama-scroll 150s linear infinite;
  will-change: transform;
}

.panorama-track img {
  width: 2085px;
  height: 100%;
  object-fit: cover;
  display: block;
  flex: 0 0 2085px;
}

/* Every other copy is horizontally flipped — adjacent edges become mirror
   reflections of the same column, so the seam disappears completely. */
.panorama-track img.flip { transform: scaleX(-1); }

@keyframes panorama-scroll {
  from { transform: translate3d(0, 0, 0); }
  to   { transform: translate3d(-4170px, 0, 0); } /* one [O][M] unit */
}

/* Top + bottom fade only: solid bg color → transparent. Smooth transition
   from dark page bg into the panorama on top and bottom edges. */
.panorama-fade {
  position: absolute;
  top: 320px;
  left: 0;
  width: 1280px;
  height: 885px;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgb(2,22,23) 0%, rgba(2,22,23,0) 25.797%),
    linear-gradient(0deg,   rgb(2,22,23) 0%, rgba(2,22,23,0) 22.491%);
}

/* 2. Pins container — clipped by mask, sits between fade and glasses */
.pins-layer {
  position: absolute;
  top: 563px;
  left: 76.05px;
  width: 1126.897px;
  height: 399px;
  pointer-events: none;
  -webkit-mask-image: url(../../assets/Mask.png);
          mask-image: url(../../assets/Mask.png);
  -webkit-mask-size: 100% 100%;
          mask-size: 100% 100%;
  -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;
}

/* Pins move in LOCKSTEP with the panorama. Track is 2× the panorama unit
   ([O][M] = 4170 wide × 2 = 8340), scrolls -4170 in 150s — same px/s as
   panorama-track. Each pin sits over a CONSTANT panorama-track X over time. */
.pins-track {
  position: absolute;
  top: 0;
  left: 0;
  width: 8340px;
  height: 100%;
  animation: pins-scroll 150s linear infinite;
  will-change: transform;
}

@keyframes pins-scroll {
  from { transform: translate3d(0, 0, 0); }
  to   { transform: translate3d(-4170px, 0, 0); }
}

.pin {
  position: absolute;
  width: 72px;
  /* height varies; set inline */
  transform-origin: center bottom;
}

.pin__circle {
  position: absolute;
  top: 0;
  left: 0;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid rgba(121, 251, 186, 0.5);
  display: grid;
  place-items: center;
  overflow: hidden;
  will-change: transform;
  /* float animation now driven per-pin via WAAPI so the line can stretch in sync */
}

/* Green frosted-glass tint over the blur. Sits between blur-bg (z:0) and icon (z:2). */
.pin__circle::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(121, 251, 186, 0.43);
  pointer-events: none;
  z-index: 1;
}

/* Real blur of the panorama behind the pin — fallback for browsers/contexts
   where backdrop-filter doesn't render visibly (e.g. inside masked ancestors).
   We render an actual copy of Panorama.webp positioned to align with where the
   pin sits on the panorama, then CSS-blur it. */
.pin__blur-bg {
  position: absolute;
  inset: -20px;
  background-image: url(../../assets/Panorama.webp);
  background-size: 2085px 885px;
  background-repeat: repeat-x;
  filter: blur(16px);
  pointer-events: none;
  z-index: 0;
}

.pin__circle img {
  position: relative;
  z-index: 2;
  width: 40px;
  height: 40px;
  display: block;
  pointer-events: none;
  user-select: none;
}

.pin__line {
  position: absolute;
  top: 72px;
  left: 35px;
  width: 1px;
  background: linear-gradient(180deg, rgba(121,251,186,0.85) 0%, rgba(121,251,186,0.3) 100%);
}

.pin__dot {
  position: absolute;
  left: 30px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--green-soft);
  box-shadow: 0 0 8px rgba(121,251,186,0.7);
}

/* 3. Glasses + Reflections — overlay the lenses, sit on top of pins */
.glasses-img,
.reflections-img {
  position: absolute;
  top: 563px;
  left: 76.05px;
  width: 1126.897px;
  height: 399px;
  pointer-events: none;
  user-select: none;
}

.reflections-img {
  mix-blend-mode: screen;
  opacity: 0.95;
}

/* 4. STATIC TEXT + LOGOS */

.ep-logo {
  position: absolute;
  top: 71px;
  left: 550px;
  width: 179.38px;
  height: 64px;

.ep-logo img {

  height: 100%;

.vue-wordmark {

.vue-wordmark img {

.subtitle {
  position: absolute;
  top: 415px;
  left: 370px;
  width: 542px;
  height: 25px;
  text-align: center;
  font-family: "Inter", sans-serif;

  font-size: 21px;
  line-height: 1.2;
  letter-spacing: 5.88px;
  color: var(--green);
  text-transform: uppercase;
  white-space: nowrap;
}

.tagline {
  position: absolute;
  top: 468px;
  left: 435px;
  width: 411px;
  height: 19px;
  text-align: center;
  font-family: "Inter", sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.2;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1.44px;
  white-space: nowrap;
}

/* Brand strip — 5 icon+text pairs (icons sourced from assets/lucide/*.svg via CSS mask) */
.brand-strip {
  position: absolute;
  top: 1099px;
  left: 111px;
  width: 1041px;
  height: 40px;
  display: flex;
  gap: 33px;
  align-items: center;
}

.brand-strip .brand-item {
  display: inline-flex;
  align-items: center;
  gap: 16px;
}

/* Inline SVG icons — vector-effect:non-scaling-stroke + stroke-width=1 gives
   exactly 1 CSS-px stroke regardless of viewBox scaling. Stroke color = yellow. */
.brand-strip .brand-icon {
  width: 40px;
  height: 40px;
  flex: 0 0 40px;
  display: block;
  stroke: var(--green);
  fill: none;
}
.brand-strip .brand-icon path { vector-effect: non-scaling-stroke; }

.brand-strip span {
  font-family: "Inter", sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.2;
  letter-spacing: 4.48px;
  color: var(--yellow);
  text-transform: uppercase;
  white-space: nowrap;
}

/* Bottom LED-equalizer — stacked segments (rgba blocks separated by gaps).
   Each bar's height is animated via WAAPI so columns rise and fall like an old
   analog equalizer responding to audio. The segmented look comes from a
   repeating-linear-gradient inside each bar. */
.city-silhouette {
  position: absolute;
  top: 1177px;
  left: -8px;
  width: 1297px;
  height: 103px;
  display: flex;
  gap: 4px;
  align-items: flex-end;
  pointer-events: none;
  /* Horizontal mask on the equalizer ONLY — fades bars to invisible at the
     edges, holds at 70% opacity across the 25-75% center band. The panorama
     + page bg show through behind, so no overlay plate is needed and there's
     no horizontal seam where a plate would end. */
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.3) 25%, rgba(0,0,0,0.3) 75%, transparent 100%);
          mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.3) 25%, rgba(0,0,0,0.3) 75%, transparent 100%);
}

.city-silhouette .bar {
  width: 13px;
  flex: 0 0 13px;
  /* Segments: 8px lit + 3px gap, repeating from bottom up. */
  background: repeating-linear-gradient(
    to top,
    rgba(60, 130, 80, 0.92) 0px,
    rgba(60, 130, 80, 0.92) 8px,
    transparent 8px,
    transparent 11px
  );
  will-change: height;
}

.footer {
  position: absolute;
  top: 1148px;
  left: 0;
  width: 1278px;
  height: 132px;
  background: none;
}


.footer-text {

  letter-spacing: 4.48px;

  white-space: nowrap;
}

.footer-left  { left: 56px;   width: 206px; }
.footer-right { left: 1039px; width: 177px; text-align: right; }

</style>

<script>
/* ----- Stage scaling to viewport ----- */
function resizeStage () {
  var stage = document.getElementById('stage');
  if (!stage) return;
  var scale = Math.min(window.innerWidth / 1280, window.innerHeight / 1280);
  stage.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', resizeStage);
resizeStage();

/* ----- LED equalizer bars: each column rises and falls independently ----- */
(function buildEqualizer () {
  var c = document.getElementById('citySilhouette');
  /* Container is 1297 wide. Each slot = 13 (bar) + 4 (gap) = 17 px → ~76 bars. */
  var barCount = 76;
  /* Snap heights to multiples of 11 (one segment = 8 + 3 gap) for clean LED look */
  var segPx = 11;
  var minSegs = 1;
  var maxSegs = 9;  /* 9 segments × 11 = 99 px (just under 103 container height) */

  function pickHeight() {
    return (minSegs + Math.floor(Math.random() * (maxSegs - minSegs + 1))) * segPx;
  }

  for (var i = 0; i < barCount; i++) {
    var b = document.createElement('div');
    b.className = 'bar';
    var startH = pickHeight();
    b.style.height = startH + 'px';
    c.appendChild(b);

    /* Each bar pulses to 3 different random heights, with own phase + duration.
       Snapped to segment multiples gives that "chunky LED" feel where columns
       jump segment-by-segment rather than smoothly slide. ease-in-out softens
       the jumps without losing the analog-equalizer character. */
    var h1 = pickHeight();
    var h2 = pickHeight();
    var h3 = pickHeight();
    var dur = 5400 + Math.random() * 7200;   /* 5.4-12.6s per cycle (+50% slower) */
    var delay = -Math.random() * dur;         /* random phase offset */
    b.animate([
      { height: startH + 'px' },
      { height: h1 + 'px' },
      { height: h2 + 'px' },
      { height: h3 + 'px' },
      { height: startH + 'px' }
    ], {
      duration: dur,
      delay: delay,
      iterations: Infinity,
      easing: 'cubic-bezier(0.4, 0, 0.6, 1)'
    });
  }
})();

/* ----- Pins generation ----- */
(function buildPins () {
  var track   = document.getElementById('pinsTrack');
  /* Track is 8340 wide = 2× one [O][M] unit (each 4170). Distribute pins across
     0..4170, DUPLICATE at 4170..8340 for seamless loop. Track scrolls -4170 in
     150s, matching panorama exactly → pins stay locked to panorama. */
  var halfW   = 4170;
  var pinH    = [12, 25, 38, 51, 64, 77, 90, 103];
  var icons   = [
    'shield-check', 'building-2', 'briefcase-business',
    'badge-dollar-sign', 'chart-column-increasing', 'battery-charging',
    'ev-charger', 'file-text', 'network', 'square-activity'
  ];

  /* Seeded pseudo-random for deterministic layout */
  var seed = 1337;
  function rand() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }

  var pinCount = 52; /* density unchanged: ~14 pins visible at any time in the 1126.897-wide lens viewport */
  /* Distribute evenly across the half-width with jitter */
  var spacing = halfW / pinCount;

  function makePin(xWithinHalf, side, idx) {
    var pin = document.createElement('div');
    pin.className = 'pin';
    var lineH = pinH[Math.floor(rand() * pinH.length)];
    var height = 72 + lineH + 12; /* circle + line + dot */
    pin.style.height = height + 'px';
    /* Anchor pin bottom 85-135px above mask bottom. Raised +15 from previous
       70-100 base, randomization spread widened 30→50 so dots vary more. */
    var bottomFromMaskBottom = 85 + rand() * 50;  /* dot bottom at lens Y 264-314 */
    pin.style.top  = (399 - height - bottomFromMaskBottom) + 'px';
    pin.style.left = (side * halfW + xWithinHalf) + 'px';

    var circle = document.createElement('div');
    circle.className = 'pin__circle';
    /* per-pin float params, applied via WAAPI below so line can stretch in sync */
    var phase    = rand() * 5;          /* 0-5s phase offset */
    var dur      = 3 + rand() * 3;      /* 3-6s period — slower → smoother */
    var floatUp  = 6 + rand() * 6;      /* 6-12px up from rest */
    var floatDn  = 6 + rand() * 6;      /* 6-12px down — clamped below to keep line ≥6px */
    floatDn      = Math.min(floatDn, lineH - 6);

    /* Blurred panorama bg — fakes "backdrop-blur" reliably even inside masks.
       Position the panorama image (2085×885) so the spot under the pin lands
       at the circle's CENTER. Center of circle in blur-bg coords is (56, 56)
       because blur-bg has inset:-20 (shifts circle (36,36) center to 56,56).
       Modulo 2085 wraps long-track pin positions into the single image. */
    var panTrackX = 872.05 + xWithinHalf;     /* X on the [O][M][O][M] track */
    var panImageX = panTrackX % 2085;         /* X within a single image */
    var panY = 243 + (399 - height - bottomFromMaskBottom);
    var bg = document.createElement('div');
    bg.className = 'pin__blur-bg';
    bg.style.backgroundPosition = (56 - panImageX) + 'px ' + (56 - panY) + 'px';
    circle.appendChild(bg);

    var iconName = icons[Math.floor(rand() * icons.length)];
    var iconImg = document.createElement('img');
    iconImg.src = '../../assets/lucide/lucide_' + iconName + '.svg';
    iconImg.alt = '';
    iconImg.loading = 'eager';
    circle.appendChild(iconImg);

    var line = document.createElement('div');
    line.className = 'pin__line';
    line.style.height = lineH + 'px';
    line.style.top = '72px';

    var dot = document.createElement('div');
    dot.className = 'pin__dot';
    dot.style.top = (72 + lineH + 1) + 'px';

    pin.appendChild(circle);
    pin.appendChild(line);
    pin.appendChild(dot);

    /* Synced float: circle moves -floatUp..+floatDn; line top + height adjust
       so the line's BOTTOM stays fixed at (72+lineH) and the line's TOP keeps
       touching the circle's bottom. Dot is untouched (anchored to building). */
    var timing = { duration: dur * 1000, delay: -phase * 1000, iterations: Infinity, easing: 'cubic-bezier(0.4, 0, 0.6, 1)' };
    circle.animate([
      { transform: 'translate3d(0, ' + (-floatUp) + 'px, 0)' },
      { transform: 'translate3d(0, ' + ( floatDn) + 'px, 0)' },
      { transform: 'translate3d(0, ' + (-floatUp) + 'px, 0)' }
    ], timing);
    line.animate([
      { top: (72 - floatUp) + 'px', height: (lineH + floatUp) + 'px' },
      { top: (72 + floatDn) + 'px', height: (lineH - floatDn) + 'px' },
      { top: (72 - floatUp) + 'px', height: (lineH + floatUp) + 'px' }
    ], timing);

    return pin;
  }

  for (var i = 0; i < pinCount; i++) {
    var jitter = (rand() - 0.5) * spacing * 0.7;
    var x = spacing * (i + 0.5) + jitter;
    /* Save current rand state to reuse identical params for the duplicate */
    var stateBefore = seed;
    track.appendChild(makePin(x, 0, i));
    /* reset seed so duplicate uses the same icon / size / position offsets */
    seed = stateBefore;
    track.appendChild(makePin(x, 1, i));
  }
})();
</script>
