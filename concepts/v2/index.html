<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUE — Concept v2 (Static)</title>
<link rel="stylesheet" href="../../shared/service-menu.css">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #021617;
    color: #fff;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
  }
  .stage {
    position: relative;
    width: min(100vw, 100vh);
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: #021617;
  }
  .stage img.full {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .badge {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(8,24,22,0.6);
    border: 1px solid rgba(121,251,186,0.2);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
</style>
</head>
<body>

<div class="badge">Concept v2 · Static</div>

<div class="stage">
  <img class="full" src="../../assets/V02.png" alt="VUE Concept v2 — static composition">
</div>

<script>
  window.PREVIEW_CONCEPTS = [
    { id: 'v1', label: 'v1 Animated', href: '../v1/' },
    { id: 'v2', label: 'v2 Static',   href: '../v2/' },
    { id: 'v3', label: 'v3 Static',   href: '../v3/' }
  ];
  window.PREVIEW_CURRENT = 'v2';
  window.PREVIEW_HOME    = '../../';
</script>
<script src="../../shared/service-menu.js" defer></script>

</body>
</html>
