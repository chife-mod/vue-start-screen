<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUE — Building Intelligence Platform · Concepts</title>
<style>
  :root {
    --bg: #021617;
    --bg-card: rgba(8, 28, 26, 0.75);
    --green: #6ffbb5;
    --yellow: #ffec8b;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.65);
    --text-faint: rgba(255,255,255,0.45);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(circle at 50% 25%, rgba(111, 251, 181, 0.06) 0%, transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 64px 32px 96px;
  }

  header {
    text-align: center;
    margin-bottom: 64px;
  }

  .logo {
    display: inline-block;
    margin: 0 auto 28px;
  }

  .logo img {
    height: 36px;
    width: auto;
    display: block;
    opacity: 0.85;
  }

  h1 {
    font-family: "Helvetica Neue", "Inter", sans-serif;
    font-weight: 200;
    font-size: clamp(38px, 6vw, 64px);
    line-height: 1.05;
    margin: 0 0 14px;
    letter-spacing: 0.01em;
  }
  h1 .accent { color: var(--green); }

  .subtitle {
    font-size: 14px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 8px;
  }

  .tagline {
    font-style: italic;
    font-weight: 300;
    color: var(--text-faint);
    font-size: 15px;
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .card {
    position: relative;
    display: block;
    text-decoration: none;
    color: inherit;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    overflow: hidden;
    background: var(--bg-card);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform 240ms cubic-bezier(.2,.7,.2,1),
                border-color 240ms ease,
                box-shadow 240ms ease;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(111,251,181,0.35);
    box-shadow: 0 20px 60px -10px rgba(0,0,0,0.5),
                0 0 0 1px rgba(111,251,181,0.15);
  }

  .card__preview {
    aspect-ratio: 1 / 1;
    background: #000;
    position: relative;
    overflow: hidden;
  }

  .card__preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 600ms cubic-bezier(.2,.7,.2,1);
  }

  .card:hover .card__preview img { transform: scale(1.03); }

  .card__body {
    padding: 18px 20px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .card__title {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .card__meta {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .card--animated .card__meta { color: var(--green); }

  .card__arrow {
    color: var(--text-faint);
    font-size: 18px;
    line-height: 1;
    transition: transform 220ms ease, color 220ms ease;
  }

  .card:hover .card__arrow {
    color: var(--green);
    transform: translateX(4px);
  }

  footer {
    margin-top: 80px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="logo"><img src="assets/EP_Logo.svg" alt="EnergyPlus"></div>
    <p class="subtitle">Building Intelligence Platform</p>
    <h1>V<span class="accent">U</span>E — Concept Previews</h1>
    <p class="tagline">Your buildings. Your compliance. Your control.</p>
  </header>

  <div class="grid">

    <a class="card card--animated" href="concepts/v1/">
      <div class="card__preview">
        <img src="assets/figma/_screenshot.png" alt="Concept v1 — animated preview">
      </div>
      <div class="card__body">
        <div>
          <div class="card__title">Concept v1</div>
          <div class="card__meta">Animated</div>
        </div>
        <span class="card__arrow">→</span>
      </div>
    </a>

    <a class="card" href="concepts/v2/">
      <div class="card__preview">
        <img src="assets/V02.png" alt="Concept v2 — static preview">
      </div>
      <div class="card__body">
        <div>
          <div class="card__title">Concept v2</div>
          <div class="card__meta">Static</div>
        </div>
        <span class="card__arrow">→</span>
      </div>
    </a>

    <a class="card" href="concepts/v3/">
      <div class="card__preview">
        <img src="assets/V03.png" alt="Concept v3 — static preview">
      </div>
      <div class="card__body">
        <div>
          <div class="card__title">Concept v3</div>
          <div class="card__meta">Static</div>
        </div>
        <span class="card__arrow">→</span>
      </div>
    </a>

  </div>

  <footer>#ENJOYTHEVUE</footer>
</div>

</body>
</html>
